

services:
  gestalt_backend_server:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env.dev
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app        # mount project allows for reloading
  code_sandbox:
    build: 
      context: ./code_sandbox
      dockerfile: Dockerfile
    ports:
      - 8080:8080
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./frontend/.env.dev.docker
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app        # mount project allows for reloading
      - /app/node_modules  
  
