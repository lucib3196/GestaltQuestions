name: FastAPI CI DEV

# Only triggers if there is a backend change
on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend_build.yml"
    branches: ["main", "dev"]

  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend_build.yml"
    branches: ["dev", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      MODE: "dev"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
      TAVILY_API_KEY: ${{secrets.TAVILY_API_KEY}}
      STORAGE_BUCKET: ${{secrets.STORAGE_BUCKET}}
      FIREBASE_CRED: ${{vars.FIREBASE_JSON_PATH}}

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python-version}}

      # Install java for firebase
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # Install python dependencies
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install dependencies
        run: poetry install
        working-directory: ./backend

      # Setup firebase and firebase emulator

      - name: Decode Firebase credentials
        working-directory: ./backend
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_JSON }}' > ${{vars.FIREBASE_JSON_PATH}}
          cd secrets
          ls -l
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Start firebase emulator
        run: firebase emulators:start --only auth,firestore,storage --project demo-test & sleep 10

      - name: Run Test
        run: |
          poetry run python -m pytest
        working-directory: ./backend
